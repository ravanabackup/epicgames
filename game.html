<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Giveaways | Real-time INR</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent: #0071e3;
            --success: #34c759;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --glass-bg: rgba(28, 28, 30, 0.7);
                --glass-border: rgba(255, 255, 255, 0.12);
                --text-main: #f5f5f7;
                --text-sub: #a1a1a6;
                --accent: #0a84ff;
                --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            /* Liquid Background Glows */
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(0, 113, 227, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(10, 132, 255, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LIQUID GLASS CONTAINER */
        .header-card {
            background: var(--glass-bg);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
            max-width: 520px;
        }

        h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1.2px; }

        .toggle-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* APPLE SWITCH */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(120, 120, 128, 0.35);
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px; width: 24px;
            left: 2px; bottom: 2px;
            background-color: #fff;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* GRID SYSTEM */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1250px;
        }

        /* GLASS CARD */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(190%);
            -webkit-backdrop-filter: blur(25px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card:hover { transform: translateY(-8px) scale(1.02); }

        .card-image { width: 100%; height: 190px; object-fit: cover; }

        .card-content { padding: 24px; flex-grow: 1; }

        .worth-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }

        .tag {
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .tag-usd { background: var(--accent); color: #fff; }
        .tag-inr { background: rgba(52, 199, 89, 0.15); color: var(--success); border: 1px solid rgba(52, 199, 89, 0.2); }

        .title { font-size: 1.35rem; font-weight: 700; margin-bottom: 10px; line-height: 1.25; }

        .desc { font-size: 0.92rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 20px; height: 3em; overflow: hidden; }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.75rem;
        }

        .meta-item b { display: block; color: var(--text-sub); text-transform: uppercase; font-size: 0.65rem; margin-bottom: 3px; }

        .action-btn {
            background: var(--text-main);
            color: var(--bg-color);
            text-decoration: none;
            text-align: center;
            padding: 16px;
            margin: 0 24px 24px 24px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .action-btn:hover { opacity: 0.9; transform: scale(0.98); }

        #status { font-weight: 600; opacity: 0.6; margin-top: 60px; text-align: center; }
    </style>
</head>
<body>

    <div class="header-card">
        <h1>Giveaways</h1>
        <div class="toggle-section">
            <span style="opacity: 0.5">Epic Games Only</span>
            <label class="switch">
                <input type="checkbox" id="toggleInput" checked>
                <span class="slider"></span>
            </label>
            <span>Show All</span>
        </div>
        <div id="rate-info" style="font-size: 0.7rem; margin-top: 10px; opacity: 0.4;">Fetching live INR rate...</div>
    </div>

    <div id="status">Establishing secure connection...</div>
    <div class="grid" id="mainGrid"></div>

    <script>
        const GIVEAWAY_API = "https://script.google.com/macros/s/AKfycbzAgylF3ukp3UtFcI2LL6DFuKPyaaJdwUKUkmRjxhTj_mcfWVAcQSylC1DLfvi30PAhIg/exec";
        const CURRENCY_API = "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json";
        
        let rawData = [];
        let usdToInrRate = 83.50; // Fallback rate

        async function fetchExchangeRate() {
            try {
                const res = await fetch(CURRENCY_API);
                const data = await res.json();
                usdToInrRate = data.usd.inr;
                document.getElementById('rate-info').innerText = `Live Rate: 1 USD = ₹${usdToInrRate.toFixed(2)} INR`;
            } catch (e) {
                document.getElementById('rate-info').innerText = "Using estimated INR rate.";
            }
        }

        function convertToINR(worthStr) {
            if (!worthStr || worthStr === "N/A") return null;
            const numeric = parseFloat(worthStr.replace(/[^0-9.]/g, ''));
            if (isNaN(numeric)) return null;
            return (numeric * usdToInrRate).toLocaleString('en-IN', {
                style: 'currency', currency: 'INR', maximumFractionDigits: 0
            });
        }

        function toIST(dateStr) {
            if (!dateStr || dateStr === "N/A") return "N/A";
            const date = new Date(dateStr.replace(' ', 'T'));
            return date.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short' });
        }

        async function init() {
            await fetchExchangeRate();
            try {
                const response = await fetch(GIVEAWAY_API);
                rawData = await response.json();
                document.getElementById('status').style.display = 'none';
                render();
            } catch (err) {
                document.getElementById('status').innerText = "Connection lost. Please refresh.";
            }
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            const showAll = document.getElementById('toggleInput').checked;
            grid.innerHTML = '';

            let list = [...rawData].sort((a, b) => new Date(b.published_date) - new Date(a.published_date));

            if (!showAll) {
                list = list.filter(item => {
                    const pool = (item.title + item.description + item.platforms).toLowerCase();
                    return pool.includes('epic games');
                });
            }

            list.forEach(game => {
                const inrWorth = convertToINR(game.worth);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${game.image}" class="card-image" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Not+Found'">
                    <div class="card-content">
                        <div class="worth-row">
                            <span class="tag tag-usd">${game.worth}</span>
                            ${inrWorth ? `<span class="tag tag-inr">≈ ${inrWorth}</span>` : ''}
                        </div>
                        <div class="title">${game.title}</div>
                        <p class="desc">${game.description}</p>
                        <div class="meta-grid">
                            <div class="meta-item"><b>Published (IST)</b>${toIST(game.published_date)}</div>
                            <div class="meta-item"><b>Ends (IST)</b>${toIST(game.end_date)}</div>
                            <div class="meta-item"><b>Platform</b>${game.platforms}</div>
                            <div class="meta-item"><b>Status</b><span style="color:var(--success); font-weight:bold">${game.status}</span></div>
                        </div>
                    </div>
                    <a href="${game.open_giveaway_url}" target="_blank" class="action-btn">Get Giveaway</a>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('toggleInput').addEventListener('change', render);
        init();
    </script>
</body>
</html>
